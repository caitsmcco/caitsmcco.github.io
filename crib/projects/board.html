<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crib board</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    
  <div class="cbr">
    <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#C0392B;"></span>
    <input type="text" id="p1Name" value="Player 1" style="width:80px;font-size:12px;">
    <input type="number" id="p1Score" min="0" max="121" value="0" style="width:54px;">
    <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#185FA5;margin-left:8px;"></span>
    <input type="text" id="p2Name" value="Player 2" style="width:80px;font-size:12px;">
    <input type="number" id="p2Score" min="0" max="121" value="0" style="width:54px;">
    <button onclick="doUpdate(false)">Update</button>
    <button onclick="doUpdate(true)">Animate</button>
  </div>
  <div id="board"></div>
  <div id="scoreOut" style="display:flex;gap:20px;margin-top:8px;font-size:13px;color:var(--color-text-secondary);"></div>
</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="../../js/cribboard.js"></script>

</body>
</html>
