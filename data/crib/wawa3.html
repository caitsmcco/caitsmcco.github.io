<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cribbage Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#222f1e;--bg2:#151a14;--bg3:#232018;--border:#2e2a22;--text:#e8dfc8;--muted:#7a7060;--gold:#c8973a;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;min-height:100vh;padding:1.4rem 1.8rem;}
h1{font-family:'Playfair Display',serif;font-size:3rem;font-weight:600;color:var(--gold);letter-spacing:.04em;margin-bottom:.12rem;}
.subtitle{font-size:2rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:1rem;}
.filter-bar{display:flex;align-items:center;gap:.45rem;flex-wrap:wrap;margin-bottom:1rem;}
.filter-label{font-size:1rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.pill{display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);font-size:1rem;cursor:pointer;transition:border-color .15s,background .15s;user-select:none;color:var(--muted);}
.pill .pdot{width:7px;height:7px;border-radius:50%;}
.pill.active{color:var(--text);border-color:#5a5040;background:var(--bg3);}
.pill:hover{border-color:var(--gold);}
.top-row{height:60%;display:grid;grid-template-columns:2fr 3fr;gap:1rem;align-items:start;margin-bottom:1rem;}
.bottom-row{height:30%;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:1rem;align-items:start;}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:.9rem 1.1rem;height:100%}
.panel2{padding:.9rem 1.1rem;height:100%}
.pt{font-size:1rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.7rem;display:flex;align-items:center;gap:8px;}
.pt::after{content:'';flex:1;height:1px;background:var(--border);}
#heatmap-svg{display:block;width:100%;}
#board-svg{width:100%;display:block;}
.score-bar{display:flex;flex-direction:column;gap:4px;margin-top:.55rem;font-size:1rem;}
.si{display:flex;align-items:center;gap:7px;}
.sd{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.sn{color:var(--muted);min-width:56px;}
.sv{font-weight:500;}
.sr{color:var(--muted);font-size:1rem;margin-left:3px;}
.legend{display:flex;align-items:center;gap:5px;margin-top:.5rem;font-size:1rem;color:var(--muted);}
.lgc{width:90px;height:7px;border-radius:3px;}
.cards-section{margin-bottom:.55rem;}
.cards-label{font-size:1rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.3rem;}
.cards-row{display:flex;gap:3px;flex-wrap:wrap;align-items:center;min-height:42px;}
.card{width:52px;height:76px;border-radius:3px;border:1px solid #3a3020;background:#f5f0e8;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:2px;font-weight:700;font-family:'IBM Plex Mono',monospace;transition:transform .15s;}
.card:hover{transform:translateY(-3px);}
.card .cr{font-size:13px;line-height:1;}
.card .cs{font-size:15px;line-height:1;}
.card.red .cr,.card.red .cs{color:#c0392b;}
.card.black .cr,.card.black .cs{color:#1a1814;}
.card.blank{background:#1a1814;border-color:#2e2a22;}
.card-divider{width:1px;height:38px;background:var(--border);margin:0 3px;flex-shrink:0;}
.no-sel{color:var(--muted);font-size:1rem;padding:.4rem 0;}
.tooltip{position:fixed;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:.4rem .65rem;font-size:1rem;color:var(--text);pointer-events:none;opacity:0;transition:opacity .12s;z-index:100;line-height:1.75;}
.tooltip.vis{opacity:1;}
.tth{color:var(--gold);font-weight:500;margin-bottom:1px;}
</style>
</head>
<body>
<h1>Cribbage</h1>
<div class="subtitle">An analysis of 25 games of cribbage</div>
<div class="filter-bar"><span class="filter-label">Opponent</span></div>
<div class="top-row">
  <div class="panel" name="heatmap">
    <div class="pt">Rounds</span></div>
    <div style="overflow-x:auto"><svg id="heatmap-svg"></svg></div>
    <div class="legend"><span id="leg-l">Opponent</span><canvas class="lgc" id="legend-canvas"></canvas><span id="leg-r">Caitlin leading</span></div>
  </div>
  <div class="panel2" name="cribbageboard">
    <div class="pt">Board position</div>
    <svg id="board-svg" viewBox="-10 30 720 200"></svg>
    <div style="padding:10;">
        <div id="cards-content"></div>
        <div class="score-bar">
            <div class="si"><span class="sd" id="dot1"></span><span class="sn" id="p1-label">—</span><span class="sv" id="p1-score">0</span><span class="sr" id="p1-detail"></span></div>
            <div class="si"><span class="sd" id="dot2"></span><span class="sn" id="p2-label">—</span><span class="sv" id="p2-score">0</span><span class="sr" id="p2-detail"></span></div>
        </div>
    </div>
    
</div>
</div>
<div class="bottom-row">
    <div class="panel" width=""><div class="pt">Win / loss by opponent</div><svg id="bar3"></svg></div>
    <div class="panel"><div class="pt">Round score vs avg &amp; best</div><svg id="bar1"></svg><div id="bar1-empty" style="font-size:1rem;color:var(--muted);">Select a round</div></div>
    <div class="panel"><div class="pt">Points by type</div><svg id="bar2"></svg><div id="bar2-empty" style="font-size:1rem;color:var(--muted);">Select a round</div></div>
</div>
<div class="tooltip" id="tooltip"></div>
<script>
const CAITLIN='Caitlin';
const OPPONENTS=['Sarah','James','Colban','Darren'];
const PCOL={
  Caitlin:{peg:'#c0392b',light:'#e85d4a'},
  Sarah:{peg:'#7B2FBE',light:'#a855f7'},
  Colban:{peg:'#0e7c55',light:'#10b981'},
  James:{peg:'#185fa5',light:'#3a8fd4'},
  Darren:{peg:'#d2d249',light:'#fffe56'},
};
const FONT='IBM Plex Mono,monospace';
const SUIT={H:'♥',D:'♦',C:'♣',S:'♠'};
const RED=new Set(['H','D']);

function makeScale(opp,max){
  return d3.scaleDiverging().domain([-max,0,max])
    .interpolator(d3.interpolateRgbBasis([(PCOL[opp]||PCOL.Colban).peg,'#1a1814','#8B1A10']));
}

// ── BOARD ─────────────────────────────────────
const BVW=680,BVH=380,PX=52,PY=10;
const bW=BVW-PX*2,bH=BVH-PY*2,LS=bH/3;
const YT=PY+LS*.5,YB=PY+LS*1.5,YM=PY+LS*1;
const XL=PX,XR=PX+bW,RB=LS/2,RS=LS/4,SEP=15,HR=4.5,PR=7.0;

function buildTrack(v){
  const s=(x0,x1,y,n)=>Array.from({length:n},(_,i)=>({x:x0+(x1-x0)*(i+.5)/n,y}));
  const a=(cx,cy,r,a0,a1,n,ro)=>{const R=r+ro;return Array.from({length:n},(_,i)=>{const aa=a0+(a1-a0)*(i+.5)/n;return{x:cx+Math.cos(aa)*R,y:cy+Math.sin(aa)*R};});};
  return[...s(XL,XR,YT+v,35),...a(XR,(YT+YB)/2,RB,-Math.PI/2,Math.PI/2,10,v),...s(XR,XL,YB+v,35),...a(XL,(YB+YM)/2,RS,Math.PI/2,3*Math.PI/2,5,v),...s(XL,XR,YM+v,36)];
}
const p1Pts=buildTrack(-SEP/2),p2Pts=buildTrack(+SEP/2);

function pegPos(sc,lane){
  const pts=lane==='p1'?p1Pts:p2Pts,v=lane==='p1'?-SEP/2:SEP/2;
  if(sc<=0)return{x:XL-14,y:YT+v};
  return pts[Math.min(Math.round(sc)-1,pts.length-1)];
}

const bsvg=d3.select('#board-svg');
const bR=XR+RB+SEP+10,bT=YT-SEP-12,bBt=YM+SEP+67,bRX=RB+SEP+45;
bsvg.append('path').attr('d',
  `M ${8} ${bT} L ${bR-bRX} ${bT} Q ${bR} ${bT} ${bR} ${bT+bRX} L ${bR} ${bBt-bRX} Q ${bR} ${bBt} ${bR-bRX} ${bBt} L ${8} ${bBt} Q ${8-12} ${bBt} ${8-12} ${bBt-12} L ${8-12} ${bT+12} Q ${8-12} ${bT} ${8} ${bT} Z`)
  .attr('fill','#2c2010').attr('stroke','#1c1408').attr('stroke-width',2);
const ap=(cx,cy,r,a0,a1)=>{const x0=cx+Math.cos(a0)*r,y0=cy+Math.sin(a0)*r,x1=cx+Math.cos(a1)*r,y1=cy+Math.sin(a1)*r;return`M ${x0} ${y0} A ${r} ${r} 0 ${Math.abs(a1-a0)>Math.PI?1:0} ${a1>a0?1:0} ${x1} ${y1}`;};
const gd=bsvg.append('g').attr('stroke','#3a2e18').attr('stroke-width',.6).attr('fill','none');
[-SEP/2,SEP/2].forEach(v=>{
  gd.append('line').attr('x1',XL).attr('y1',YT+v).attr('x2',XR).attr('y2',YT+v);
  gd.append('line').attr('x1',XL).attr('y1',YB+v).attr('x2',XR).attr('y2',YB+v);
  gd.append('line').attr('x1',XL).attr('y1',YM+v).attr('x2',XR).attr('y2',YM+v);
  gd.append('path').attr('d',ap(XR,(YT+YB)/2,RB+v,-Math.PI/2,Math.PI/2));
  gd.append('path').attr('d',ap(XL,(YB+YM)/2,RS+v,Math.PI/2,3*Math.PI/2));
});
[p1Pts,p2Pts].forEach(pts=>{
  const g=bsvg.append('g');
  g.selectAll('.rim').data(pts).join('circle').attr('class','rim').attr('cx',d=>d.x).attr('cy',d=>d.y).attr('r',HR+1.4).attr('fill','#5a4020');
  g.selectAll('.h').data(pts).join('circle').attr('class','h').attr('cx',d=>d.x).attr('cy',d=>d.y).attr('r',HR).attr('fill','#140e04');
});
[5,10,15,20,25,30,35,50,55,60,65,70,75,80,90,95,100,105,110,115,120,121].forEach(n=>{
  if(n<1||n>121)return;const p=p1Pts[n-1];if(!p)return;
  const dy=n<=35?-(HR+5.5):n<=80?(HR-15):-(HR+5.5);
  bsvg.append('text').attr('x',p.x).attr('y',p.y+dy).attr('text-anchor','middle').attr('dominant-baseline','middle')
    .attr('fill','#f0d880').attr('font-size',7).attr('font-family',FONT).text(n);
});

const peg1=bsvg.append('circle').attr('r',PR).attr('stroke','rgba(0,0,0,.3)').attr('stroke-width',1);
const peg2=bsvg.append('circle').attr('r',PR).attr('stroke','rgba(0,0,0,.3)').attr('stroke-width',1);
const sh1=bsvg.append('circle').attr('r',PR*.27).attr('fill','rgba(255,255,255,.36)').attr('pointer-events','none');
const sh2=bsvg.append('circle').attr('r',PR*.27).attr('fill','rgba(255,255,255,.36)').attr('pointer-events','none');
const lb1=bsvg.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle').attr('fill','#fff').attr('font-size',6.5).attr('font-weight','bold').attr('font-family',FONT).attr('pointer-events','none');
const lb2=bsvg.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle').attr('fill','#fff').attr('font-size',6.5).attr('font-weight','bold').attr('font-family',FONT).attr('pointer-events','none');

function setPegColors(c1,c2){peg1.attr('fill',c1);peg2.attr('fill',c2);document.getElementById('dot1').style.background=c1;document.getElementById('dot2').style.background=c2;}
function placePegs(s1,s2,anim,i1,i2){
  const pp1=pegPos(s1,'p1'),pp2=pegPos(s2,'p2'),dur=480;
  const upd=(sel,x,y)=>anim?sel.transition().duration(dur).ease(d3.easeCubicInOut).attr('cx',x).attr('cy',y):sel.attr('cx',x).attr('cy',y);
  upd(peg1,pp1.x,pp1.y);upd(peg2,pp2.x,pp2.y);upd(sh1,pp1.x-PR*.25,pp1.y-PR*.25);upd(sh2,pp2.x-PR*.25,pp2.y-PR*.25);
  const updT=(sel,x,y)=>anim?sel.transition().duration(dur).ease(d3.easeCubicInOut).attr('x',x).attr('y',y):sel.attr('x',x).attr('y',y);
  updT(lb1,pp1.x,pp1.y+.5);updT(lb2,pp2.x,pp2.y+.5);
  if(i1!==undefined)lb1.text(i1);if(i2!==undefined)lb2.text(i2);
}
placePegs(0,0,false,'C','?');setPegColors(PCOL.Caitlin.peg,'#555');

// ── CARDS ─────────────────────────────────────
function parseCard(s){if(!s||s.trim()==='--')return null;s=s.trim();return{rank:s.slice(0,-1),suit:s.slice(-1),red:RED.has(s.slice(-1))};}
function cardEl(c){
  if(!c)return'<div class="card blank"></div>';
  return`<div class="card ${c.red?'red':'black'}"><span class="cr">${c.rank}</span><span class="cs">${SUIT[c.suit]||c.suit}</span></div>`;
}
function renderCards(rd,game){
  const el=document.getElementById('cards-content');
  if(!rd||!game){el.innerHTML='<div class="no-sel">Hover or click a round</div>';return;}
  const rawRows=game._raw.filter(r=>+r.Round===rd.round);
  const byP=Object.fromEntries(rawRows.map(r=>[r.Name,r]));
  const r1=byP[game.p1name],r2=byP[game.p2name];
  const pCards=row=>row?['p1','p2','p3','p4','p5','p6','p7'].map(f=>parseCard(row[f])).filter(Boolean):[];
  const cCards=row=>row?[parseCard(row.d1),parseCard(row.d2)].filter(Boolean):[];
  const cc=r1?parseCard(r1.cc):r2?parseCard(r2.cc):null;
  const c1=(PCOL[game.p1name]||PCOL.Caitlin).peg,c2=(PCOL[game.p2name]||PCOL.Colban).peg;
  el.innerHTML=`
    <div style="font-size:1rem;color:var(--muted);margin-bottom:.45rem">
      CUT: ${cc?`<span style="color:${cc.red?'#e85d4a':'#e8dfc8'}">${cc.rank}${SUIT[cc.suit]||cc.suit}</span>`:'—'} · round ${rd.round}
    </div>
    <div class="cards-section"><div class="cards-label" style="color:${c1}">${game.p1name}</div>
      <div class="cards-row">${pCards(r1).map(c=>cardEl(c)).join('')||'<span style="font-size:1rem;color:var(--muted)">—</span>'}</div></div>
    <div class="cards-section"><div class="cards-label" style="color:${c2}">${game.p2name}</div>
      <div class="cards-row">${pCards(r2).map(c=>cardEl(c)).join('')||'<span style="font-size:1rem;color:var(--muted)">—</span>'}</div></div>
    <div class="cards-section"><div class="cards-label">Crib</div>
      <div class="cards-row">
        <span style="font-size:1rem;color:${c1};margin-right:1px">${game.p1name[0]}</span>${cCards(r1).map(c=>cardEl(c)).join('')}
        <div class="card-divider"></div>
        <span style="font-size:1rem;color:${c2};margin-right:1px">${game.p2name[0]}</span>${cCards(r2).map(c=>cardEl(c)).join('')}
      </div></div>`;
}

// ── BAR CHARTS ────────────────────────────────
function clearChart(id){d3.select('#'+id).selectAll('*').remove();}
function bDims(id){const e=document.getElementById(id),w=e.getBoundingClientRect().width||240;return{w,h:150,ml:28,mr:6,mt:10,mb:26};}

function renderBar1(rd,game,allGames){
  clearChart('bar1');const empty=document.getElementById('bar1-empty');
  if(!rd){empty.style.display='block';return;}empty.style.display='none';
  function roundPts(g){
    return g.rounds.map(r=>{
      const prev=g.rounds.find(x=>x.round===r.round-1);
      return{round:r.round,pts1:r.s1!==null?(r.s1-(prev?prev.s1||0:0)):null,pts2:r.s2!==null?(r.s2-(prev?prev.s2||0:0)):null};
    });
  }
  const all=allGames.flatMap(g=>roundPts(g));
  const avg1=d3.mean(all.filter(r=>r.pts1!==null),r=>r.pts1)||0;
  const avg2=d3.mean(all.filter(r=>r.pts2!==null),r=>r.pts2)||0;
  const best1=d3.max(all.filter(r=>r.pts1!==null),r=>r.pts1)||0;
  const best2=d3.max(all.filter(r=>r.pts2!==null),r=>r.pts2)||0;
  const tp=roundPts(game).find(r=>r.round===rd.round)||{pts1:0,pts2:0};
  const t1=tp.pts1||0,t2=tp.pts2||0;
  const c1=(PCOL[game.p1name]||PCOL.Caitlin).peg,c2=(PCOL[game.p2name]||PCOL.Colban).peg;
  const {w,h,ml,mr,mt,mb}=bDims('bar1');
  const svg=d3.select('#bar1').attr('width',w).attr('height',h+mt+mb);
  const W=w-ml-mr,H=h,g=svg.append('g').attr('transform',`translate(${ml},${mt})`);
  const cats=['Avg','This','Best'],v1=[avg1,t1,best1],v2=[avg2,t2,best2];
  const maxV=d3.max([...v1,...v2])||1;
  const x0=d3.scaleBand().domain(cats).range([0,W]).padding(.25);
  const xi=d3.scaleBand().domain(['p1','p2']).range([0,x0.bandwidth()]).padding(.08);
  const y=d3.scaleLinear().domain([0,maxV*1.15]).range([H,0]);
  g.append('g').attr('transform',`translate(0,${H})`).call(d3.axisBottom(x0).tickSize(0))
    .call(ax=>{ax.select('.domain').remove();ax.selectAll('text').attr('fill','#7a7060').attr('font-size',7.5).attr('font-family',FONT);});
  g.append('g').call(d3.axisLeft(y).ticks(4).tickSize(-W))
    .call(ax=>{ax.select('.domain').remove();ax.selectAll('.tick line').attr('stroke','#2e2a22').attr('stroke-dasharray','2,2');ax.selectAll('text').attr('fill','#7a7060').attr('font-size',6.5).attr('font-family',FONT);});
  cats.forEach((cat,ci)=>{
    [[v1[ci],c1,'p1'],[v2[ci],c2,'p2']].forEach(([val,col,key])=>{
      if(val<=0)return;
      const bx=x0(cat)+xi(key),bw=xi.bandwidth(),by=y(val),bh=H-by;
      g.append('rect').attr('x',bx).attr('y',by).attr('width',bw).attr('height',Math.max(bh,0)).attr('fill',col).attr('rx',2).attr('opacity',.85);
      g.append('text').attr('x',bx+bw/2).attr('y',by-3).attr('text-anchor','middle').attr('fill',col).attr('font-size',6).attr('font-family',FONT).text(Math.round(val*10)/10);
    });
  });
  [[game.p1name,c1],[game.p2name,c2]].forEach(([n,col],i)=>{
    g.append('rect').attr('x',W-65).attr('y',i*12).attr('width',6).attr('height',6).attr('fill',col).attr('rx',1);
    g.append('text').attr('x',W-56).attr('y',i*12+5.5).attr('fill','#7a7060').attr('font-size',6.5).attr('font-family',FONT).text(n);
  });
}

function renderBar2(rd,game){
  clearChart('bar2');const empty=document.getElementById('bar2-empty');
  if(!rd){empty.style.display='block';return;}empty.style.display='none';
  const c1=(PCOL[game.p1name]||PCOL.Caitlin).peg,c2=(PCOL[game.p2name]||PCOL.Colban).peg;
  const cats=['Pegged','Hand','Crib'],v1=[rd.p1pegged,rd.p1hand,rd.p1crib],v2=[rd.p2pegged,rd.p2hand,rd.p2crib];
  const maxV=d3.max([...v1,...v2])||1;
  const {w,h,ml,mr,mt,mb}=bDims('bar2');
  const svg=d3.select('#bar2').attr('width',w).attr('height',h+mt+mb);
  const W=w-ml-mr,H=h,g=svg.append('g').attr('transform',`translate(${ml},${mt})`);
  const x0=d3.scaleBand().domain(cats).range([0,W]).padding(.25);
  const xi=d3.scaleBand().domain(['p1','p2']).range([0,x0.bandwidth()]).padding(.08);
  const y=d3.scaleLinear().domain([0,maxV*1.15]).range([H,0]);
  g.append('g').attr('transform',`translate(0,${H})`).call(d3.axisBottom(x0).tickSize(0))
    .call(ax=>{ax.select('.domain').remove();ax.selectAll('text').attr('fill','#7a7060').attr('font-size',7.5).attr('font-family',FONT);});
  g.append('g').call(d3.axisLeft(y).ticks(4).tickSize(-W))
    .call(ax=>{ax.select('.domain').remove();ax.selectAll('.tick line').attr('stroke','#2e2a22').attr('stroke-dasharray','2,2');ax.selectAll('text').attr('fill','#7a7060').attr('font-size',6.5).attr('font-family',FONT);});
  cats.forEach((cat,ci)=>{
    [[v1[ci],c1,'p1'],[v2[ci],c2,'p2']].forEach(([val,col,key])=>{
      if(val<=0)return;
      const bx=x0(cat)+xi(key),bw=xi.bandwidth(),by=y(val),bh=H-by;
      g.append('rect').attr('x',bx).attr('y',by).attr('width',bw).attr('height',Math.max(bh,0)).attr('fill',col).attr('rx',2).attr('opacity',.85);
      g.append('text').attr('x',bx+bw/2).attr('y',by-3).attr('text-anchor','middle').attr('fill',col).attr('font-size',6).attr('font-family',FONT).text(val);
    });
  });
}

function renderBar3(allGames){
  clearChart('bar3');
  const opps=[...new Set(allGames.map(g=>g.p2name))];
  const data=opps.map(opp=>{
    const gs=allGames.filter(g=>g.p2name===opp);
    const wins=gs.filter(g=>{const l=g.rounds[g.rounds.length-1];return l&&l.s1>=121;}).length;
    return{opp,wins,losses:gs.length-wins,total:gs.length};
  });
  const {w,h,ml,mr,mt,mb}=bDims('bar3');
  const svg=d3.select('#bar3').attr('width',w).attr('height',h+mt+mb);
  const W=w-ml-mr,H=h,g=svg.append('g').attr('transform',`translate(${ml},${mt})`);
  const maxT=d3.max(data,d=>d.total)||1;
  const x=d3.scaleBand().domain(opps).range([0,W]).padding(.3);
  const y=d3.scaleLinear().domain([0,maxT+.5]).range([H,0]);
  const xi=d3.scaleBand().domain(['w','l']).range([0,x.bandwidth()]).padding(.06);
  g.append('g').attr('transform',`translate(0,${H})`).call(d3.axisBottom(x).tickSize(0))
    .call(ax=>{ax.select('.domain').remove();ax.selectAll('text').attr('fill','#7a7060').attr('font-size',7).attr('font-family',FONT);});
  g.append('g').call(d3.axisLeft(y).ticks(maxT+1).tickFormat(d=>Number.isInteger(d)?d:'').tickSize(-W))
    .call(ax=>{ax.select('.domain').remove();ax.selectAll('.tick line').attr('stroke','#2e2a22').attr('stroke-dasharray','2,2');ax.selectAll('text').attr('fill','#7a7060').attr('font-size',6.5).attr('font-family',FONT);});
  data.forEach(d=>{
    const oc=(PCOL[d.opp]||PCOL.Colban).peg;
    [[d.wins,'#c0392b','w'],[d.losses,oc,'l']].forEach(([val,fill,key])=>{
      if(val<=0)return;
      const bx=x(d.opp)+xi(key),bw=xi.bandwidth(),by=y(val),bh=H-by;
      g.append('rect').attr('x',bx).attr('y',by).attr('width',bw).attr('height',Math.max(bh,0)).attr('fill',fill).attr('rx',2).attr('opacity',.85);
      g.append('text').attr('x',bx+bw/2).attr('y',by-3).attr('text-anchor','middle').attr('fill',fill).attr('font-size',6.5).attr('font-family',FONT).text(val);
    });
  });
  g.append('rect').attr('x',W-50).attr('y',0).attr('width',6).attr('height',6).attr('fill','#c0392b').attr('rx',1);
  g.append('text').attr('x',W-41).attr('y',5.5).attr('fill','#7a7060').attr('font-size',6.5).attr('font-family',FONT).text('Wins');
  g.append('rect').attr('x',W-50).attr('y',11).attr('width',6).attr('height',6).attr('fill','#555').attr('rx',1);
  g.append('text').attr('x',W-41).attr('y',16.5).attr('fill','#7a7060').attr('font-size',6.5).attr('font-family',FONT).text('Loss');
}

// ── STATE & DATA ──────────────────────────────
let allGames=[],activeFilter=null,selectedCell=null;

d3.csv('edited.csv').then(raw=>{
  const grouped=d3.groups(raw,d=>d.gameDate);
  allGames=grouped.map(([date,rows])=>{
    const names=[...new Set(rows.map(d=>d.Name))];
    const p1name=CAITLIN,p2name=names.find(p=>p!==CAITLIN)||names[1]||'Unknown';
    const maxRound=d3.max(rows,d=>+d.Round);
    const pv=v=>v&&v.trim()!==''?+v:0;
    const rounds=d3.range(1,maxRound+1).map(r=>{
      const rr=rows.filter(d=>+d.Round===r),byP=Object.fromEntries(rr.map(d=>[d.Name,d]));
      const r1=byP[p1name],r2=byP[p2name];
      return{round:r,s1:r1?(+r1.EORScore||0):null,s2:r2?(+r2.EORScore||0):null,
        p1pegged:r1?pv(r1.peggedPoints):0,p2pegged:r2?pv(r2.peggedPoints):0,
        p1hand:r1?pv(r1.handPoints):0,p2hand:r2?pv(r2.handPoints):0,
        p1crib:r1?pv(r1.cribPoints):0,p2crib:r2?pv(r2.cribPoints):0};
    });
    return{date,p1name,p2name,rounds,maxRound,_raw:rows};
  });
  buildPills();render();
});

function buildPills(){
  const bar=document.querySelector('.filter-bar');
  const mk=(label,opp,col)=>{
    const p=document.createElement('div');
    p.className='pill'+(opp===null?' active':'');p.dataset.opp=opp===null?'__all__':opp;
    p.innerHTML=`<span class="pdot" style="background:${col}"></span>${label}`;
    p.addEventListener('click',()=>{activeFilter=opp;selectedCell=null;
      document.querySelectorAll('.pill').forEach(el=>el.classList.toggle('active',el.dataset.opp===(opp===null?'__all__':opp)));
      render();});
    bar.appendChild(p);
  };
  mk('All games',null,'#5a5040');
  OPPONENTS.forEach(opp=>{if(allGames.some(g=>g.p2name===opp))mk(opp,opp,(PCOL[opp]||PCOL.Colban).peg);});
}

function filteredGames(){return activeFilter?allGames.filter(g=>g.p2name===activeFilter):allGames;}

function render(){
  const games=filteredGames();
  renderHeatmap(games);
  renderBar3(allGames);
  const first=games[0];
  if(first){
    const last=first.rounds[first.rounds.length-1];
    setPegColors((PCOL[first.p1name]||PCOL.Caitlin).peg,(PCOL[first.p2name]||PCOL.Colban).peg);
    placePegs(last.s1??0,last.s2??0,false,first.p1name[0],first.p2name[0]);
    document.getElementById('p1-label').textContent=first.p1name;
    document.getElementById('p2-label').textContent=first.p2name;
    document.getElementById('p1-score').textContent=last.s1??0;
    document.getElementById('p2-score').textContent=last.s2??0;
    document.getElementById('p1-detail').textContent='final';
    document.getElementById('p2-detail').textContent='';
    renderLegend(activeFilter||first.p2name,games);
    document.getElementById('leg-l').textContent=(activeFilter||first.p2name);
  }
  renderCards(null,null);
  clearChart('bar1');document.getElementById('bar1-empty').style.display='block';
  clearChart('bar2');document.getElementById('bar2-empty').style.display='block';
}

function activateCell(game,rd,anim){
  setPegColors((PCOL[game.p1name]||PCOL.Caitlin).peg,(PCOL[game.p2name]||PCOL.Colban).peg);
  placePegs(rd.s1,rd.s2,anim,game.p1name[0],game.p2name[0]);
  document.getElementById('p1-label').textContent=game.p1name;
  document.getElementById('p2-label').textContent=game.p2name;
  document.getElementById('p1-score').textContent=rd.s1;
  document.getElementById('p2-score').textContent=rd.s2;
  document.getElementById('p1-detail').textContent=`after round ${rd.round}`;
  document.getElementById('p2-detail').textContent='';
  renderCards(rd,game);
  renderBar1(rd,game,filteredGames());
  renderBar2(rd,game);
}

function renderHeatmap(games){
  const svg=d3.select('#heatmap-svg');svg.selectAll('*').remove();
  if(!games.length){svg.append('text').attr('x',12).attr('y',26).attr('fill','#5a5040').attr('font-size',13).attr('font-family',FONT).text('No games.');return;}

  const FIXED_H=850,maxR=d3.max(games,g=>g.maxRound);
  const LEFT=138,TOP=36,BOT=16;
  const availH=FIXED_H-TOP-BOT;
  const CELL_H=Math.floor((availH-games.length*3)/games.length);
  const ROW_H=CELL_H+3;
  const CELL_W=60,COL_W=CELL_W+3;
  const totalW=LEFT+maxR*COL_W+38,totalH=TOP+games.length*ROW_H+BOT;
  svg.attr('width',totalW).attr('height',Math.max(totalH,FIXED_H));

  const globalMax=d3.max(games.flatMap(g=>g.rounds.map(r=>r.s1!==null&&r.s2!==null?Math.abs(r.s1-r.s2):0)))||1;

  d3.range(1,maxR+1).forEach(r=>{
    svg.append('text').attr('x',LEFT+(r-1)*COL_W+CELL_W/2).attr('y',TOP-10)
      .attr('text-anchor','middle').attr('fill','#5a5040').attr('font-size',13).attr('font-family',FONT).text(r);
  });
  svg.append('text').attr('x',LEFT+(maxR/2)*COL_W).attr('y',TOP-23)
    .attr('text-anchor','middle').attr('fill','#3a3020').attr('font-size',15).attr('font-family',FONT).attr('letter-spacing',2).text('ROUND');

  const tip=document.getElementById('tooltip');

  games.forEach((game,gi)=>{
    const gy=TOP+gi*ROW_H;
    const oppCol=(PCOL[game.p2name]||PCOL.Colban).peg;
    const cScale=makeScale(game.p2name,globalMax);
    const ds=new Date(game.date).toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'2-digit'});

    // Row highlight background
    const rowBg=svg.append('rect').attr('x',0).attr('y',gy-1).attr('width',totalW).attr('height',CELL_H+2)
      .attr('fill','transparent').attr('rx',3).style('transition','fill .1s');

    svg.append('text').attr('x',LEFT-8).attr('y',gy+CELL_H/2-5).attr('text-anchor','end').attr('dominant-baseline','middle')
      .attr('fill','#e8dfc8').attr('font-size',13).attr('font-family',FONT).text(ds);
    svg.append('text').attr('x',LEFT-8).attr('y',gy+CELL_H/2+6).attr('text-anchor','end').attr('dominant-baseline','middle')
      .attr('fill',oppCol).attr('font-size',10).attr('font-family',FONT).text('vs '+game.p2name);

    game.rounds.forEach(rd=>{
      const cx=LEFT+(rd.round-1)*COL_W;
      const diff=(rd.s1!==null&&rd.s2!==null)?(rd.s1-rd.s2):null;
      const fill=diff!==null?cScale(diff):'#1a1814';
      const isSel=selectedCell&&selectedCell.gameDate===game.date&&selectedCell.round===rd.round;

      const cell=svg.append('rect').attr('x',cx).attr('y',gy).attr('width',CELL_W).attr('height',CELL_H).attr('rx',3)
        .attr('fill',fill).attr('stroke',isSel?'#c8973a':'#0f0e0c').attr('stroke-width',isSel?2:1.5)
        .attr('cursor',diff!==null?'pointer':'default');

      if(diff!==null){
        svg.append('text').attr('x',cx+CELL_W/2).attr('y',gy+CELL_H/2+1)
          .attr('text-anchor','middle').attr('dominant-baseline','middle')
          .attr('fill',`rgba(255,255,255,${Math.abs(diff)>globalMax*.25?.58:.22})`)
          .attr('font-size',Math.min(CELL_H*.38,20)).attr('font-family',FONT).attr('pointer-events','none')
          .text(diff>0?`+${diff}`:diff);

        const node=cell.node();
        node.addEventListener('mouseenter',()=>{
          rowBg.attr('fill','rgba(255,255,255,.04)');
          cell.attr('stroke','#c8973a').attr('stroke-width',2);
          if(!selectedCell) activateCell(game,rd,true);
          const c2l=(PCOL[game.p2name]||PCOL.Colban).light;
          tip.innerHTML=`<div class="tth">Round ${rd.round} — ${ds}</div>
            <div style="color:${(PCOL[game.p1name]||PCOL.Caitlin).peg}">${game.p1name}: ${rd.s1} &nbsp;(peg ${rd.p1pegged} · hand ${rd.p1hand}${rd.p1crib?` · crib ${rd.p1crib}`:''})</div>
            <div style="color:${c2l}">${game.p2name}: ${rd.s2} &nbsp;(peg ${rd.p2pegged} · hand ${rd.p2hand}${rd.p2crib?` · crib ${rd.p2crib}`:''})</div>
            <div style="color:#5a5040;margin-top:1px">diff ${diff>0?'+':''}${diff}</div>`;
          tip.classList.add('vis');
        });
        node.addEventListener('mousemove',e=>{tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-10)+'px';});
        node.addEventListener('mouseleave',()=>{
          rowBg.attr('fill','transparent');
          const iS=selectedCell&&selectedCell.gameDate===game.date&&selectedCell.round===rd.round;
          cell.attr('stroke',iS?'#c8973a':'#0f0e0c').attr('stroke-width',iS?2:1.5);
          tip.classList.remove('vis');
          if(selectedCell){
            const sg=allGames.find(g=>g.date===selectedCell.gameDate);
            const sr=sg&&sg.rounds.find(r=>r.round===selectedCell.round);
            if(sg&&sr)activateCell(sg,sr,false);
          }
        });
        node.addEventListener('click',()=>{
          const iS=selectedCell&&selectedCell.gameDate===game.date&&selectedCell.round===rd.round;
          if(iS){selectedCell=null;}else{selectedCell={gameDate:game.date,round:rd.round};activateCell(game,rd,true);}
          renderHeatmap(filteredGames());
        });
      }
    });

    // Winner star
    const last=game.rounds[game.rounds.length-1];
    if(last&&last.s1!==null&&last.s2!==null){
      const winner=last.s1>=121?game.p1name:last.s2>=121?game.p2name:null;
      if(winner){
        const wc=winner===game.p1name?(PCOL[game.p1name]||PCOL.Caitlin).light:(PCOL[game.p2name]||PCOL.Colban).light;
        svg.append('text').attr('x',LEFT+game.maxRound*COL_W+5).attr('y',gy+CELL_H/2+1)
          .attr('dominant-baseline','middle').attr('fill',wc).attr('font-size',18).attr('font-family',FONT).text('★');
      }
    }
  });
}

function renderLegend(opp,games){
  const gmax=d3.max(games.flatMap(g=>g.rounds.map(r=>r.s1!==null&&r.s2!==null?Math.abs(r.s1-r.s2):0)))||1;
  const scale=makeScale(opp,gmax);
  const lc=document.getElementById('legend-canvas');lc.width=90;lc.height=7;
  const lctx=lc.getContext('2d');
  for(let i=0;i<90;i++){lctx.fillStyle=scale((i/89)*2*gmax-gmax);lctx.fillRect(i,0,1,7);}
}
