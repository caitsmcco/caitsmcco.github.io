<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cribbage Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:     #0f0e0c;
  --bg2:    #1a1814;
  --bg3:    #232018;
  --border: #2e2a22;
  --text:   #e8dfc8;
  --muted:  #7a7060;
  --gold:   #c8973a;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  min-height: 100vh;
  padding: 1.5rem 2rem;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.7rem;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: .04em;
  margin-bottom: .15rem;
}
.subtitle {
  font-size: .68rem;
  color: var(--muted);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 1.2rem;
}

/* filter bar */
.filter-bar {
  display: flex;
  align-items: center;
  gap: .5rem;
  flex-wrap: wrap;
  margin-bottom: 1.2rem;
}
.filter-label {
  font-size: .63rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-right: .2rem;
}
.pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg2);
  font-size: .68rem;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  user-select: none;
  color: var(--muted);
}
.pill .pill-dot { width:8px; height:8px; border-radius:50%; }
.pill.active    { color:var(--text); border-color:#5a5040; background:var(--bg3); }
.pill:hover     { border-color:var(--gold); }

/* main layout: heatmap left, board right */
.main {
  display: grid;
  grid-template-columns: auto minmax(320px, 480px);
  gap: 1.2rem;
  align-items: start;
}

.panel {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem 1.2rem;
}
.panel-title {
  font-size: .62rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: .8rem;
  display: flex;
  align-items: center;
  gap: 8px;
}
.panel-title::after { content:''; flex:1; height:1px; background:var(--border); }

.heatmap-wrap { overflow-x: auto; }

#board-svg { width:100%; display:block; }

.score-bar {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-top: .7rem;
  font-size: .72rem;
}
.score-item  { display:flex; align-items:center; gap:8px; }
.score-dot   { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.score-name  { color:var(--muted); min-width:58px; }
.score-val   { font-weight:500; }
.score-round { color:var(--muted); font-size:.62rem; margin-left:4px; }

.legend {
  display:flex; align-items:center; gap:6px;
  margin-top:.6rem; font-size:.62rem; color:var(--muted);
}
.legend-grad { width:100px; height:8px; border-radius:3px; }

.tooltip {
  position:fixed;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:6px;
  padding:.45rem .7rem;
  font-size:.68rem;
  color:var(--text);
  pointer-events:none;
  opacity:0;
  transition:opacity .12s;
  z-index:100;
  line-height:1.75;
}
.tooltip.vis { opacity:1; }
.tt-head { color:var(--gold); font-weight:500; margin-bottom:1px; }
</style>
</head>
<body>

<h1>Cribbage</h1>
<div class="subtitle">Game history dashboard</div>

<div class="filter-bar">
  <span class="filter-label">Opponent</span>
</div>

<div class="main">

  <!-- LEFT: heatmap -->
  <div class="panel">
    <div class="panel-title">Score differential per round
      <span style="color:var(--muted);font-size:.57rem">(hover → board)</span>
    </div>
    <div class="heatmap-wrap">
      <svg id="heatmap-svg"></svg>
    </div>
    <div class="legend">
      <span id="leg-l">Caitlin leading</span>
      <canvas class="legend-grad" id="legend-canvas"></canvas>
      <span id="leg-r">Opponent leading</span>
    </div>
  </div>

  <!-- RIGHT: board + scores -->
  <div class="panel">
    <div class="panel-title">Board position</div>
    <svg id="board-svg" viewBox="0 0 560 360"></svg>
    <div class="score-bar">
      <div class="score-item">
        <span class="score-dot" id="dot1"></span>
        <span class="score-name" id="p1-label">—</span>
        <span class="score-val"  id="p1-score">0</span>
        <span class="score-round" id="p1-detail"></span>
      </div>
      <div class="score-item">
        <span class="score-dot" id="dot2"></span>
        <span class="score-name" id="p2-label">—</span>
        <span class="score-val"  id="p2-score">0</span>
        <span class="score-round" id="p2-detail"></span>
      </div>
    </div>
  </div>

</div>

<div class="tooltip" id="tooltip"></div>

<script>
// ═══════════════════════════════════════════════════
//  PLAYER COLOURS
//  Caitlin = always P1 (red).
//  Each opponent has a distinct peg colour and their
//  own diverging heat-scale (their colour vs red).
// ═══════════════════════════════════════════════════
const CAITLIN = 'Caitlin';

const PCOL = {
  Caitlin: { peg:'#c0392b', light:'#e85d4a' },
  Sarah:   { peg:'#7B2FBE', light:'#a855f7' },
  James:   { peg:'#0e7c55', light:'#10b981' },
  Colban:  { peg:'#185fa5', light:'#3a8fd4' },
  Darren:  { peg:'#b45309', light:'#f59e0b' },
};

function makeScale(oppName, maxDiff) {
  const oppHex = (PCOL[oppName]||PCOL.Colban).peg;
  return d3.scaleDiverging()
    .domain([-maxDiff, 0, maxDiff])
    .interpolator(d3.interpolateRgbBasis([oppHex, '#1a1814', '#8B1A10']));
}

// ═══════════════════════════════════════════════════
//  BOARD  (viewBox 560 × 360)
// ═══════════════════════════════════════════════════
const BVW=560, BVH=360;
const PX=44, PY=28;
const bW=BVW-PX*2, bH=BVH-PY*2;
const LS=bH/3;
const YT=PY+LS*.5, YB=PY+LS*1.5, YM=PY+LS*2.5;
const XL=PX, XR=PX+bW;
const RB=LS/2, RS=LS/2;
const SEP=9, HR=3.8, PR=6.2;

const BBG='#2c2010', WDK='#1c1408', HIN='#140e04', HRM='#5a4020', LC='#f0d880', TC='#3a2e18';

function buildTrack(v){
  const str=(x0,x1,y,n)=>Array.from({length:n},(_,i)=>({x:x0+(x1-x0)*(i+.5)/n,y}));
  const arc=(cx,cy,r,a0,a1,n,ro)=>{
    const R=r+ro;
    return Array.from({length:n},(_,i)=>{const a=a0+(a1-a0)*(i+.5)/n;return{x:cx+Math.cos(a)*R,y:cy+Math.sin(a)*R};});
  };
  return[
    ...str(XL,XR,YT+v,35),
    ...arc(XR,(YT+YB)/2,RB,-Math.PI/2,Math.PI/2,10,v),
    ...str(XR,XL,YB+v,35),
    ...arc(XL,(YB+YM)/2,RS,Math.PI/2,3*Math.PI/2,5,v),
    ...str(XL,XR,YM+v,36),
  ];
}
const p1Pts=buildTrack(-SEP/2), p2Pts=buildTrack(+SEP/2);

function pegPos(score,lane){
  const pts=lane==='p1'?p1Pts:p2Pts;
  const v=lane==='p1'?-SEP/2:SEP/2;
  if(score<=0)return{x:XL-14,y:YT+v};
  return pts[Math.min(Math.round(score)-1,pts.length-1)];
}

const bsvg=d3.select('#board-svg');
const bR=XR+RB+SEP+4, bT=YT-SEP-12, bBt=YM+SEP+12, bRX=RB+SEP+4;

bsvg.append('path')
  .attr('d',`M ${XL} ${bT} L ${bR-bRX} ${bT} Q ${bR} ${bT} ${bR} ${bT+bRX}
    L ${bR} ${bBt-bRX} Q ${bR} ${bBt} ${bR-bRX} ${bBt}
    L ${XL} ${bBt} Q ${XL-12} ${bBt} ${XL-12} ${bBt-12}
    L ${XL-12} ${bT+12} Q ${XL-12} ${bT} ${XL} ${bT} Z`)
  .attr('fill',BBG).attr('stroke',WDK).attr('stroke-width',2);

const ap=(cx,cy,r,a0,a1)=>{
  const x0=cx+Math.cos(a0)*r,y0=cy+Math.sin(a0)*r,x1=cx+Math.cos(a1)*r,y1=cy+Math.sin(a1)*r;
  return`M ${x0} ${y0} A ${r} ${r} 0 ${Math.abs(a1-a0)>Math.PI?1:0} ${a1>a0?1:0} ${x1} ${y1}`;
};

const gd=bsvg.append('g').attr('stroke',TC).attr('stroke-width',.6).attr('fill','none');
[-SEP/2,SEP/2].forEach(v=>{
  gd.append('line').attr('x1',XL).attr('y1',YT+v).attr('x2',XR).attr('y2',YT+v);
  gd.append('line').attr('x1',XL).attr('y1',YB+v).attr('x2',XR).attr('y2',YB+v);
  gd.append('line').attr('x1',XL).attr('y1',YM+v).attr('x2',XR).attr('y2',YM+v);
  gd.append('path').attr('d',ap(XR,(YT+YB)/2,RB+v,-Math.PI/2,Math.PI/2));
  gd.append('path').attr('d',ap(XL,(YB+YM)/2,RS+v,Math.PI/2,3*Math.PI/2));
});

[p1Pts,p2Pts].forEach(pts=>{
  const g=bsvg.append('g');
  g.selectAll('.rim').data(pts).join('circle').attr('class','rim').attr('cx',d=>d.x).attr('cy',d=>d.y).attr('r',HR+1.4).attr('fill',HRM);
  g.selectAll('.h').data(pts).join('circle').attr('class','h').attr('cx',d=>d.x).attr('cy',d=>d.y).attr('r',HR).attr('fill',HIN);
});

[5,10,15,20,25,30,35,50,55,60,65,70,75,80,90,95,100,105,110,115,120,121].forEach(n=>{
  if(n<1||n>121)return;
  const p=p1Pts[n-1]; if(!p)return;
  const dy=n<=35?-(HR+5.5):n<=80?(HR+5.5):-(HR+5.5);
  bsvg.append('text').attr('x',p.x).attr('y',p.y+dy)
    .attr('text-anchor','middle').attr('dominant-baseline','middle')
    .attr('fill',LC).attr('font-size',5.8).attr('font-family','IBM Plex Mono,monospace').attr('font-weight','bold').text(n);
});
bsvg.append('text').attr('x',XL-16).attr('y',YT)
  .attr('text-anchor','end').attr('dominant-baseline','middle')
  .attr('fill',LC).attr('font-size',7).attr('font-family','IBM Plex Mono,monospace').attr('font-weight','bold').text('START');

const peg1=bsvg.append('circle').attr('r',PR).attr('stroke','rgba(0,0,0,.3)').attr('stroke-width',1);
const peg2=bsvg.append('circle').attr('r',PR).attr('stroke','rgba(0,0,0,.3)').attr('stroke-width',1);
const sh1=bsvg.append('circle').attr('r',PR*.27).attr('fill','rgba(255,255,255,.36)').attr('pointer-events','none');
const sh2=bsvg.append('circle').attr('r',PR*.27).attr('fill','rgba(255,255,255,.36)').attr('pointer-events','none');
const lb1=bsvg.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
  .attr('fill','#fff').attr('font-size',6.5).attr('font-weight','bold').attr('font-family','IBM Plex Mono,monospace').attr('pointer-events','none');
const lb2=bsvg.append('text').attr('text-anchor','middle').attr('dominant-baseline','middle')
  .attr('fill','#fff').attr('font-size',6.5).attr('font-weight','bold').attr('font-family','IBM Plex Mono,monospace').attr('pointer-events','none');

function setPegColors(c1,c2){
  peg1.attr('fill',c1); peg2.attr('fill',c2);
  document.getElementById('dot1').style.background=c1;
  document.getElementById('dot2').style.background=c2;
}

function placePegs(s1,s2,animate,i1,i2){
  const pp1=pegPos(s1,'p1'), pp2=pegPos(s2,'p2'), dur=480;
  const upd=(sel,x,y)=>animate?sel.transition().duration(dur).ease(d3.easeCubicInOut).attr('cx',x).attr('cy',y):sel.attr('cx',x).attr('cy',y);
  upd(peg1,pp1.x,pp1.y); upd(peg2,pp2.x,pp2.y);
  upd(sh1,pp1.x-PR*.25,pp1.y-PR*.25); upd(sh2,pp2.x-PR*.25,pp2.y-PR*.25);
  const updT=(sel,x,y)=>animate?sel.transition().duration(dur).ease(d3.easeCubicInOut).attr('x',x).attr('y',y):sel.attr('x',x).attr('y',y);
  updT(lb1,pp1.x,pp1.y+.5); updT(lb2,pp2.x,pp2.y+.5);
  if(i1!==undefined) lb1.text(i1);
  if(i2!==undefined) lb2.text(i2);
}

placePegs(0,0,false,'C','?');
setPegColors(PCOL.Caitlin.peg,'#555');

// ═══════════════════════════════════════════════════
//  DATA + RENDER
// ═══════════════════════════════════════════════════
const OPPONENTS=['Sarah','James','Colban','Darren'];
let allGames=[], activeFilter=null;

d3.csv('data.csv').then(raw=>{
  const grouped=d3.groups(raw,d=>d.gameDate);
  allGames=grouped.map(([date,rows])=>{
    const names=[...new Set(rows.map(d=>d.Name))];
    const p1name=CAITLIN;
    const p2name=names.find(p=>p!==CAITLIN)||names[1]||'Unknown';
    const maxRound=d3.max(rows,d=>+d.Round);
    const rounds=d3.range(1,maxRound+1).map(r=>{
      const rr=rows.filter(d=>+d.Round===r);
      const byP=Object.fromEntries(rr.map(d=>[d.Name,d]));
      const r1=byP[p1name],r2=byP[p2name];
      const parse=(v)=>v&&v.trim()!==''?+v:0;
      return{
        round:r,
        s1:r1?(+r1.EORScore||0):null,
        s2:r2?(+r2.EORScore||0):null,
        p1pegged:r1?parse(r1.peggedPoints):0, p2pegged:r2?parse(r2.peggedPoints):0,
        p1hand:r1?parse(r1.handPoints):0,     p2hand:r2?parse(r2.handPoints):0,
        p1crib:r1?parse(r1.cribPoints):0,     p2crib:r2?parse(r2.cribPoints):0,
      };
    });
    return{date,p1name,p2name,rounds,maxRound};
  });

  buildPills();
  render();
});

function buildPills(){
  const bar=document.querySelector('.filter-bar');
  const mk=(label,opp,col)=>{
    const p=document.createElement('div');
    p.className='pill'+(opp===null?' active':'');
    p.dataset.opp=opp===null?'__all__':opp;
    p.innerHTML=`<span class="pill-dot" style="background:${col}"></span>${label}`;
    p.addEventListener('click',()=>{
      activeFilter=opp;
      document.querySelectorAll('.pill').forEach(el=>
        el.classList.toggle('active', el.dataset.opp===(opp===null?'__all__':opp)));
      render();
    });
    bar.appendChild(p);
  };
  mk('All games',null,'#5a5040');
  OPPONENTS.forEach(opp=>{
    if(allGames.some(g=>g.p2name===opp))
      mk(opp,opp,(PCOL[opp]||PCOL.Colban).peg);
  });
}

function render(){
  const games=activeFilter?allGames.filter(g=>g.p2name===activeFilter):allGames;
  renderHeatmap(games);
  const first=games[0];
  if(first){
    const last=first.rounds[first.rounds.length-1];
    const c1=(PCOL[first.p1name]||PCOL.Caitlin).peg;
    const c2=(PCOL[first.p2name]||PCOL.Colban).peg;
    setPegColors(c1,c2);
    placePegs(last.s1??0,last.s2??0,false,first.p1name[0],first.p2name[0]);
    document.getElementById('p1-label').textContent=first.p1name;
    document.getElementById('p2-label').textContent=first.p2name;
    document.getElementById('p1-score').textContent=last.s1??0;
    document.getElementById('p2-score').textContent=last.s2??0;
    document.getElementById('p1-detail').textContent='final';
    document.getElementById('p2-detail').textContent='';
    const opp=activeFilter||first.p2name;
    document.getElementById('leg-r').textContent=opp+' leading';
    renderLegend(opp,games);
  }
}

function renderHeatmap(games){
  const svg=d3.select('#heatmap-svg');
  svg.selectAll('*').remove();
  if(!games.length){
    svg.attr('width',260).attr('height',50);
    svg.append('text').attr('x',14).attr('y',28).attr('fill','#5a5040')
      .attr('font-size',11).attr('font-family','IBM Plex Mono,monospace').text('No games.');
    return;
  }

  const CELL=31,GAP=3,ROW_H=CELL+GAP,COL_W=CELL+GAP;
  const LEFT=144,TOP=44,BOT=22;
  const maxR=d3.max(games,g=>g.maxRound);
  const globalMax=d3.max(games.flatMap(g=>
    g.rounds.map(r=>r.s1!==null&&r.s2!==null?Math.abs(r.s1-r.s2):0)))||1;

  svg.attr('width',LEFT+maxR*COL_W+44).attr('height',TOP+games.length*ROW_H+BOT);

  // Round header
  d3.range(1,maxR+1).forEach(r=>{
    svg.append('text').attr('x',LEFT+(r-1)*COL_W+CELL/2).attr('y',TOP-12)
      .attr('text-anchor','middle').attr('fill','#5a5040')
      .attr('font-size',8.5).attr('font-family','IBM Plex Mono,monospace').text(r);
  });
  svg.append('text').attr('x',LEFT+(maxR/2)*COL_W).attr('y',TOP-27)
    .attr('text-anchor','middle').attr('fill','#3a3020')
    .attr('font-size',7.5).attr('font-family','IBM Plex Mono,monospace').attr('letter-spacing',2).text('ROUND');

  const tip=document.getElementById('tooltip');

  games.forEach((game,gi)=>{
    const gy=TOP+gi*ROW_H;
    const oppCol=(PCOL[game.p2name]||PCOL.Colban).peg;
    const cScale=makeScale(game.p2name,globalMax);

    // Row labels
    const ds=new Date(game.date).toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'2-digit'});
    svg.append('text').attr('x',LEFT-8).attr('y',gy+CELL/2-6)
      .attr('text-anchor','end').attr('dominant-baseline','middle')
      .attr('fill','#e8dfc8').attr('font-size',9).attr('font-family','IBM Plex Mono,monospace').text(ds);
    svg.append('text').attr('x',LEFT-8).attr('y',gy+CELL/2+7)
      .attr('text-anchor','end').attr('dominant-baseline','middle')
      .attr('fill',oppCol).attr('font-size',7.5).attr('font-family','IBM Plex Mono,monospace')
      .text('vs '+game.p2name);

    game.rounds.forEach(rd=>{
      const cx=LEFT+(rd.round-1)*COL_W;
      const diff=(rd.s1!==null&&rd.s2!==null)?(rd.s1-rd.s2):null;
      const fill=diff!==null?cScale(diff):'#1a1814';

      const cell=svg.append('rect')
        .attr('x',cx).attr('y',gy).attr('width',CELL).attr('height',CELL).attr('rx',3)
        .attr('fill',fill).attr('stroke','#0f0e0c').attr('stroke-width',1.5)
        .attr('cursor',diff!==null?'pointer':'default');

      if(diff!==null){
        svg.append('text').attr('x',cx+CELL/2).attr('y',gy+CELL/2+1)
          .attr('text-anchor','middle').attr('dominant-baseline','middle')
          .attr('fill',`rgba(255,255,255,${Math.abs(diff)>globalMax*.25?.6:.25})`)
          .attr('font-size',7).attr('font-family','IBM Plex Mono,monospace')
          .attr('pointer-events','none')
          .text(diff>0?`+${diff}`:diff);

        const node=cell.node();
        node.addEventListener('mouseenter',()=>{
          cell.attr('stroke','#c8973a').attr('stroke-width',2);
          const c1=(PCOL[game.p1name]||PCOL.Caitlin).peg;
          const c2=(PCOL[game.p2name]||PCOL.Colban).peg;
          const c2l=(PCOL[game.p2name]||PCOL.Colban).light;
          setPegColors(c1,c2);
          placePegs(rd.s1,rd.s2,true,game.p1name[0],game.p2name[0]);
          document.getElementById('p1-label').textContent=game.p1name;
          document.getElementById('p2-label').textContent=game.p2name;
          document.getElementById('p1-score').textContent=rd.s1;
          document.getElementById('p2-score').textContent=rd.s2;
          document.getElementById('p1-detail').textContent=`after round ${rd.round}`;
          document.getElementById('p2-detail').textContent='';
          tip.innerHTML=`
            <div class="tt-head">Round ${rd.round} — ${ds}</div>
            <div style="color:${c1}">${game.p1name}: ${rd.s1} &nbsp;(peg ${rd.p1pegged} · hand ${rd.p1hand}${rd.p1crib?` · crib ${rd.p1crib}`:''})</div>
            <div style="color:${c2l}">${game.p2name}: ${rd.s2} &nbsp;(peg ${rd.p2pegged} · hand ${rd.p2hand}${rd.p2crib?` · crib ${rd.p2crib}`:''})</div>
            <div style="color:#5a5040;margin-top:2px">diff ${diff>0?'+':''}${diff}</div>`;
          tip.classList.add('vis');
        });
        node.addEventListener('mousemove',e=>{
          tip.style.left=(e.clientX+14)+'px';
          tip.style.top=(e.clientY-10)+'px';
        });
        node.addEventListener('mouseleave',()=>{
          cell.attr('stroke','#0f0e0c').attr('stroke-width',1.5);
          tip.classList.remove('vis');
        });
      }
    });

    // Winner star
    const last=game.rounds[game.rounds.length-1];
    if(last.s1!==null&&last.s2!==null){
      const winner=last.s1>=121?game.p1name:last.s2>=121?game.p2name:null;
      if(winner){
        const wc=winner===game.p1name?(PCOL[game.p1name]||PCOL.Caitlin).light:(PCOL[game.p2name]||PCOL.Colban).light;
        svg.append('text').attr('x',LEFT+game.maxRound*COL_W+7).attr('y',gy+CELL/2+1)
          .attr('dominant-baseline','middle').attr('fill',wc)
          .attr('font-size',8).attr('font-family','IBM Plex Mono,monospace')
          .text(winner.slice(0,3)+'★');
      }
    }
  });
}

function renderLegend(oppName,games){
  const globalMax=d3.max(games.flatMap(g=>
    g.rounds.map(r=>r.s1!==null&&r.s2!==null?Math.abs(r.s1-r.s2):0)))||1;
  const scale=makeScale(oppName,globalMax);
  const lc=document.getElementById('legend-canvas');
  lc.width=100; lc.height=8;
  const lctx=lc.getContext('2d');
  for(let i=0;i<100;i++){
    lctx.fillStyle=scale((i/99)*2*globalMax-globalMax);
    lctx.fillRect(i,0,1,8);
  }
}
</script>
